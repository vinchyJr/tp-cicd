networks:
  frontend-net:
  backend-net:

volumes:
  postgres_data:

services:
  frontend:
    image: vinchysenior/frontend:latest
    ports:
      - "80:80"
    networks:
      - frontend-net
    depends_on:
      backend:
        condition: service_started

  backend:
    image: vinchysenior/backend:latest
    networks:
      - frontend-net
      - backend-net
    depends_on:
      database:
        condition: service_healthy

  database:
    image: postgres:15-alpine
    networks:
      - backend-net
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DATABASE_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
